name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: ./build.sh
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            extension.tar.gz
            extension_checksums.txt
